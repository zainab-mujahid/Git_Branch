<!DOCTYPE html>
<html>
<head>

<title>Contact</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<h1>Contact Us</h1>

<p>Email : info@technova.com</p>

<form>

        <label for="name">Full Name</label><br>
        <input type="text" id="name" name="name" placeholder="Enter your full name"><br><br>

        <label for="email">Email Address</label><br>
        <input type="email" id="email" name="email" placeholder="Enter your email"><br><br>

        <label for="subject">Subject</label><br>
        <input type="text" id="subject" name="subject" placeholder="Enter subject"><br><br>

        <label for="message">Message</label><br>
        <textarea id="message" name="message" rows="5" cols="40" placeholder="Write your message"></textarea><br><br>

        <button type="submit">Send Message</button>

    </form>


</body>

</html>
